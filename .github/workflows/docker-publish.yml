name: Docker Publish

on:
  push:
    branches: [ "main" ]
    tags: [ 'v*.*.*' ]

env:
  REGISTRY: ghcr.io

jobs:
  # 1. Run Code Quality First
  quality:
    uses: ./.github/workflows/code-quality.yml

  # 2. Build and Push after Quality passes
  build:
    needs: quality
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Downcase IMAGE_NAME
        run: |
          echo "IMAGE_NAME=${GITHUB_REPOSITORY@L}" >> "${GITHUB_ENV}"

      # Multi-platform support (qemu + buildx)
      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log into registry ${{ env.REGISTRY }}
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract Docker metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          tags: |
            type=ref,event=branch
            type=semver,pattern={{version}}
            type=sha,format=long
            type=raw,value=latest,enable=${{ github.ref == 'refs/heads/main' }}

      - name: Build and push Docker image
        id: build-push
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          # Multi-platform builds for Bare Metal (ARM64 for Pis, AMD64 for Cloud)
          platforms: linux/amd64,linux/arm64
          tags: ${{ steps.meta.outputs.tags }}
          labels: |
            ${{ steps.meta.outputs.labels }}
            org.opencontainers.image.source=${{ github.server_url }}/${{ github.repository }}
            org.opencontainers.image.revision=${{ github.sha }}
          # Borrowed high-perf caching
          cache-from: type=gha
          cache-to: type=gha,mode=max

  deploy:
    needs: build
    if: github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      # Connect to Tailscale network for secure SSH access
      - name: Connect to Tailscale
        uses: tailscale/github-action@v2
        with:
          authkey: ${{ secrets.TS_AUTH_KEY }}

      - name: Deploy to Server via Tailscale
        env:
          SERVER_HOST: ${{ secrets.SERVER_TAILSCALE_IP }}
          SERVER_USER: ${{ secrets.SERVER_USER }}
          SSH_PRIVATE_KEY: ${{ secrets.SSH_PRIVATE_KEY }}
          # App secrets for .env generation
          AGENT_NAME: ${{ secrets.AGENT_NAME }}
          OPENROUTER_API_KEY: ${{ secrets.OPENROUTER_API_KEY }}
          ROOT_AGENT_MODEL: ${{ secrets.ROOT_AGENT_MODEL }}
          TELEGRAM_ENABLED: ${{ secrets.TELEGRAM_ENABLED }}
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
        run: |
          # Setup SSH key
          mkdir -p ~/.ssh
          echo "$SSH_PRIVATE_KEY" > ~/.ssh/id_rsa
          chmod 600 ~/.ssh/id_rsa
          ssh-keyscan -H "$SERVER_HOST" >> ~/.ssh/known_hosts 2>/dev/null

          # Deploy script with secrets passed via environment
          ssh -o StrictHostKeyChecking=no "$SERVER_USER@$SERVER_HOST" \
            AGENT_NAME="$AGENT_NAME" \
            OPENROUTER_API_KEY="$OPENROUTER_API_KEY" \
            ROOT_AGENT_MODEL="$ROOT_AGENT_MODEL" \
            TELEGRAM_ENABLED="$TELEGRAM_ENABLED" \
            TELEGRAM_BOT_TOKEN="$TELEGRAM_BOT_TOKEN" \
            bash -s << 'DEPLOY_SCRIPT'
          set -e

          # 1. Set dynamic project directory based on repository name
          PROJECT_NAME="blacki"
          PROJECT_DIR="$HOME/apps/$PROJECT_NAME"
          IMAGE_NAME="ghcr.io/queryplanner/blacki:main"

          echo "=== Deploying $PROJECT_NAME to $PROJECT_DIR ==="

          # 2. Ensure project directory exists
          mkdir -p "$PROJECT_DIR"
          if [ ! -d "$PROJECT_DIR/.git" ]; then
            echo "Project not found. Cloning..."
            git clone https://github.com/QueryPlanner/blacki "$PROJECT_DIR"
          fi

          # 3. Navigate and Update Code
          cd "$PROJECT_DIR"
          git pull

          # 4. Stop existing container before pull (save resources on small servers)
          echo "Stopping existing containers..."
          docker compose down --remove-orphans 2>/dev/null || true

          # 5. Aggressive cleanup for small servers
          echo "Cleaning up old Docker resources..."
          docker system prune -af --volumes 2>/dev/null || true
          docker builder prune -af 2>/dev/null || true

          # 6. Generate .env file from GitHub secrets
          echo "Generating .env from secrets..."
          cat > .env << ENVFILE
          AGENT_NAME=${AGENT_NAME}
          OPENROUTER_API_KEY=${OPENROUTER_API_KEY}
          ROOT_AGENT_MODEL=${ROOT_AGENT_MODEL}
          TELEGRAM_ENABLED=${TELEGRAM_ENABLED}
          TELEGRAM_BOT_TOKEN=${TELEGRAM_BOT_TOKEN}
          ENVFILE
          chmod 600 .env

          # 7. Deploy with dynamic image
          echo "Pulling and starting containers..."
          export IMAGE="$IMAGE_NAME"
          docker compose pull
          docker compose up -d

          # 8. Final cleanup of unused images
          echo "Final cleanup..."
          docker image prune -af 2>/dev/null || true

          # 9. Health check
          echo "Waiting for health check..."
          sleep 5
          if curl -sf http://localhost:8080/health > /dev/null; then
            echo "✅ Health check passed!"
          else
            echo "⚠️ Health check failed, checking logs..."
            docker compose logs --tail=50
            exit 1
          fi

          # 10. Show status
          echo "=== Deployment Complete ==="
          docker compose ps
          df -h /
          DEPLOY_SCRIPT

      - name: Cleanup SSH
        if: always()
        run: |
          rm -f ~/.ssh/id_rsa
