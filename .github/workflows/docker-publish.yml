name: Docker Publish

on:
  push:
    branches: [ "main" ]
    tags: [ 'v*.*.*' ]

env:
  REGISTRY: ghcr.io

jobs:
  # 1. Run Code Quality First
  quality:
    uses: ./.github/workflows/code-quality.yml

  # 2. Build and Push after Quality passes
  build:
    needs: quality
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Downcase IMAGE_NAME
        run: |
          echo "IMAGE_NAME=${GITHUB_REPOSITORY@L}" >> "${GITHUB_ENV}"

      # Multi-platform support (qemu + buildx)
      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log into registry ${{ env.REGISTRY }}
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract Docker metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          tags: |
            type=ref,event=branch
            type=semver,pattern={{version}}
            type=sha,format=long
            type=raw,value=latest,enable=${{ github.ref == 'refs/heads/main' }}

      - name: Build and push Docker image
        id: build-push
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          # Multi-platform builds for Bare Metal (ARM64 for Pis, AMD64 for Cloud)
          platforms: linux/amd64,linux/arm64
          tags: ${{ steps.meta.outputs.tags }}
          labels: |
            ${{ steps.meta.outputs.labels }}
            org.opencontainers.image.source=${{ github.server_url }}/${{ github.repository }}
            org.opencontainers.image.revision=${{ github.sha }}
          # Borrowed high-perf caching
          cache-from: type=gha
          cache-to: type=gha,mode=max

  deploy:
    needs: build
    if: github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      # Connect to Tailscale network for secure SSH access
      - name: Connect to Tailscale
        uses: tailscale/github-action@v2
        with:
          authkey: ${{ secrets.TS_AUTH_KEY }}

      - name: Deploy to Server via Tailscale
        env:
          SERVER_HOST: ${{ secrets.SERVER_TAILSCALE_IP }}
          SERVER_USER: ${{ secrets.SERVER_USER }}
          SSH_PRIVATE_KEY: ${{ secrets.SSH_PRIVATE_KEY }}
          # App secrets for .env generation
          AGENT_NAME: ${{ secrets.AGENT_NAME }}
          OPENROUTER_API_KEY: ${{ secrets.OPENROUTER_API_KEY }}
          ROOT_AGENT_MODEL: ${{ secrets.ROOT_AGENT_MODEL }}
          TELEGRAM_ENABLED: ${{ secrets.TELEGRAM_ENABLED }}
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_TOOL_NOTIFICATIONS: ${{ secrets.TELEGRAM_TOOL_NOTIFICATIONS }}
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
          BRAVE_SEARCH_API_KEY: ${{ secrets.BRAVE_SEARCH_API_KEY }}
          BROWSER_USE_API_KEY: ${{ secrets.BROWSER_USE_API_KEY }}
          GH_TOKEN: ${{ secrets.GH_TOKEN }}
          SANDBOX_ENABLED: ${{ secrets.SANDBOX_ENABLED }}
          SANDBOX_DOMAIN: ${{ secrets.SANDBOX_DOMAIN }}
        run: |
          # Setup SSH key
          mkdir -p ~/.ssh
          echo "$SSH_PRIVATE_KEY" > ~/.ssh/id_rsa
          chmod 600 ~/.ssh/id_rsa
          ssh-keyscan -H "$SERVER_HOST" >> ~/.ssh/known_hosts 2>/dev/null

          # Create .env file locally to avoid SSH quoting issues with special chars
          # (DATABASE_URL contains & which breaks SSH command parsing)
          # Values are double-quoted so shell metacharacters (& ? @ =) are treated literally
          # when this file is sourced on the remote server.
          cat > /tmp/deploy.env << ENVFILE
          AGENT_NAME="${AGENT_NAME}"
          OPENROUTER_API_KEY="${OPENROUTER_API_KEY}"
          ROOT_AGENT_MODEL="${ROOT_AGENT_MODEL}"
          TELEGRAM_ENABLED="${TELEGRAM_ENABLED}"
          TELEGRAM_BOT_TOKEN="${TELEGRAM_BOT_TOKEN}"
          TELEGRAM_TOOL_NOTIFICATIONS="${TELEGRAM_TOOL_NOTIFICATIONS}"
          DATABASE_URL="${DATABASE_URL}"
          BRAVE_SEARCH_API_KEY="${BRAVE_SEARCH_API_KEY}"
          BROWSER_USE_API_KEY="${BROWSER_USE_API_KEY}"
          GH_TOKEN="${GH_TOKEN}"
          SANDBOX_ENABLED="${SANDBOX_ENABLED}"
          SANDBOX_DOMAIN="${SANDBOX_DOMAIN}"
          ENVFILE
          chmod 600 /tmp/deploy.env

          # Copy env file to server
          scp -o StrictHostKeyChecking=no /tmp/deploy.env "$SERVER_USER@$SERVER_HOST:/tmp/deploy.env"

          # Deploy script - source env file on remote server
          ssh -o StrictHostKeyChecking=no "$SERVER_USER@$SERVER_HOST" \
            "set -a && source /tmp/deploy.env && set +a && bash -s" << 'DEPLOY_SCRIPT'
          set -e

          # 1. Set dynamic project directory based on repository name
          PROJECT_NAME="blacki"
          PROJECT_DIR="$HOME/apps/$PROJECT_NAME"
          IMAGE_NAME="ghcr.io/queryplanner/blacki:main"

          echo "=== Deploying $PROJECT_NAME to $PROJECT_DIR ==="

          # 2. Ensure project directory exists
          mkdir -p "$PROJECT_DIR"
          if [ ! -d "$PROJECT_DIR/.git" ]; then
            echo "Project not found. Cloning..."
            git clone https://github.com/QueryPlanner/blacki "$PROJECT_DIR"
          fi

          # 3. Navigate and Update Code
          cd "$PROJECT_DIR"
          git pull

          # 4. Stop existing container before pull (save resources on small servers)
          echo "Stopping existing containers..."
          docker compose down --remove-orphans 2>/dev/null || true

          # 5. Aggressive cleanup for small servers
          echo "Cleaning up old Docker resources..."
          docker system prune -af --volumes 2>/dev/null || true
          docker builder prune -af 2>/dev/null || true

          # 6. Find available port starting from 8080
          find_available_port() {
            local port=8080
            while ss -tuln | grep -q ":${port} " ; do
              port=$((port + 1))
              if [ $port -gt 8100 ]; then
                echo "ERROR: No available port in range 8080-8100" >&2
                exit 1
              fi
            done
            echo $port
          }
          HOST_PORT=$(find_available_port)
          echo "Using port: $HOST_PORT"

          # 7. Generate .env file from GitHub secrets
          # Values are double-quoted so URLs with & ? @ are preserved verbatim.
          # Docker Compose dotenv parser strips surrounding quotes correctly.
          echo "Generating .env from secrets..."
          cat > .env << ENVFILE
          AGENT_NAME="${AGENT_NAME}"
          OPENROUTER_API_KEY="${OPENROUTER_API_KEY}"
          ROOT_AGENT_MODEL="${ROOT_AGENT_MODEL}"
          TELEGRAM_ENABLED="${TELEGRAM_ENABLED}"
          TELEGRAM_BOT_TOKEN="${TELEGRAM_BOT_TOKEN}"
          TELEGRAM_TOOL_NOTIFICATIONS="${TELEGRAM_TOOL_NOTIFICATIONS}"
          DATABASE_URL="${DATABASE_URL}"
          BRAVE_SEARCH_API_KEY="${BRAVE_SEARCH_API_KEY}"
          BROWSER_USE_API_KEY="${BROWSER_USE_API_KEY}"
          GH_TOKEN="${GH_TOKEN}"
          HOST_PORT="${HOST_PORT}"
          SANDBOX_ENABLED="${SANDBOX_ENABLED}"
          SANDBOX_DOMAIN="${SANDBOX_DOMAIN}"
          ENVFILE
          chmod 600 .env

          # 8. Authenticate with GHCR so the server can pull private images
          # GH_TOKEN is available from the sourced deploy.env
          echo "$GH_TOKEN" | docker login ghcr.io -u queryplanner --password-stdin

          # 9. Deploy with dynamic image
          echo "Pulling and starting containers..."
          export IMAGE="$IMAGE_NAME"
          docker compose pull
          docker compose up -d

          # 10. Final cleanup of unused images
          echo "Final cleanup..."
          docker image prune -af 2>/dev/null || true

          # 11. Health check with retries
          echo "Waiting for health check..."
          MAX_RETRIES=12
          RETRY_COUNT=0
          HEALTH_OK=false
          while [ $RETRY_COUNT -lt $MAX_RETRIES ]; do
            if curl -sf http://localhost:${HOST_PORT}/health > /dev/null 2>&1; then
              HEALTH_OK=true
              break
            fi
            RETRY_COUNT=$((RETRY_COUNT + 1))
            echo "Health check attempt $RETRY_COUNT/$MAX_RETRIES failed, retrying in 5s..."
            sleep 5
          done

          if [ "$HEALTH_OK" = true ]; then
            echo "✅ Health check passed on port ${HOST_PORT}!"
          else
            echo "⚠️ Health check failed after $MAX_RETRIES attempts, checking logs..."
            docker compose logs --tail=100
            exit 1
          fi

          # 12. Show status
          echo "=== Deployment Complete ==="
          docker compose ps
          df -h /

          # 13. Cleanup temp env file
          rm -f /tmp/deploy.env
          DEPLOY_SCRIPT

      - name: Cleanup SSH
        if: always()
        run: |
          rm -f ~/.ssh/id_rsa /tmp/deploy.env
